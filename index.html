<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCENARIOS DE ESTUDIO - MÓDULO 1 - YSA COLOMBIA INCUBATION</title>
    <style>
        /* =========================================
           VARIABLES GLOBALES (CONSERVADO)
           ========================================= */
        :root {
            --ysa-blue: #0A1E3F;
            --ysa-yellow: #FFC000;
            --edi-light: #F4F7F6;
            
            --valid-bg: #E8F5E9;
            --valid-border: #4CAF50;
            --valid-text: #2E7D32;
            
            --weak-bg: #FFF8E1;
            --weak-border: #FFB300;
            --weak-text: #F57F17;
            
            --noteval-bg: #ECEFF1;
            --noteval-border: #78909C;
            --noteval-text: #455A64;
            
            --invalid-bg: #FFEBEE;
            --invalid-border: #F44336;
            --invalid-text: #C62828;
            
            --text-dark: #333333;
            --text-muted: #666666;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--edi-light);
            color: var(--text-dark);
        }

        /* =========================================
           HEADER INSTITUCIONAL (ACTUALIZADO)
           ========================================= */
        header {
            background-color: white; padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 5px solid var(--ysa-yellow);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; gap: 20px; }
        .logo-container img { height: 50px; object-fit: contain; }
        .logo-ysa { height: 55px !important; }
        
        .header-title {
            padding-left: 20px; border-left: 2px solid #eee; text-transform: uppercase;
            line-height: 1.3;
        }
        .header-title-main { color: var(--ysa-blue); font-size: 18px; font-weight: 900; display: block;}
        .header-title-sub { color: #888; font-size: 12px; font-weight: 700; display: block; margin-top: 3px; letter-spacing: 0.5px;}
        
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .btn-fullscreen {
            background: var(--ysa-blue); border: none; color: white;
            padding: 10px 18px; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: bold; transition: all 0.2s;
        }
        .btn-fullscreen:hover { background: #153261; }

        .container { max-width: 100%; margin: 30px auto; padding: 0 40px; }

        /* =========================================
           PESTAÑAS DE PERFILES (NIVEL 1)
           ========================================= */
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0;}
        .tab-btn {
            padding: 18px 30px; background-color: #E0E5E9; border: none;
            border-radius: 8px 8px 0 0; cursor: pointer; font-size: 16px;
            font-weight: 800; color: #666; transition: all 0.2s ease;
            text-transform: uppercase; letter-spacing: 0.5px;
            flex: 1;
        }
        .tab-btn:hover { background-color: #d1d8dd; }
        .tab-btn.active {
            background-color: white; color: var(--ysa-blue);
            border-top: 5px solid var(--ysa-yellow);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03); z-index: 10; position: relative;
        }

        .content-area {
            background-color: white; padding: 40px; border-radius: 0 8px 8px 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; border-top: none;
            animation: fadeIn 0.4s ease; min-height: 500px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           CUADRO DE CONTEXTO DEL PERFIL
           ========================================= */
        .profile-context {
            background-color: var(--ysa-blue); color: white; padding: 30px;
            border-radius: 8px; margin-bottom: 40px; border-left: 6px solid var(--ysa-yellow);
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
            box-shadow: 0 4px 15px rgba(10, 30, 63, 0.15);
        }
        .profile-context h2 { grid-column: 1 / -1; margin: 0 0 10px 0; color: var(--ysa-yellow); font-size: 24px; text-transform: uppercase; }
        .profile-col h4 { color: #A0C3FF; margin: 0 0 12px 0; font-size: 15px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        .profile-col p { font-size: 15px; line-height: 1.5; margin: 0 0 15px 0; }
        .profile-col ul { margin: 0; padding-left: 20px; font-size: 14px; line-height: 1.5; color: #E0E0E0;}
        .profile-col li { margin-bottom: 8px; }

        /* =========================================
           TARJETAS INTERACTIVAS (COMPONENTES)
           ========================================= */
        .icard-comp {
            background: #fff; border: 1px solid #ccc; border-radius: 10px;
            margin-bottom: 20px; overflow: hidden; border-left: 6px solid var(--ysa-blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .icard-comp-header {
            padding: 20px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            font-size: 18px; font-weight: 800; color: var(--ysa-blue); background: #fdfdfd;
            transition: background 0.2s;
        }
        .icard-comp-header:hover { background: #f0f4f8; }
        .icard-comp-header.active { background: #f0f4f8; border-bottom: 1px solid #eee; }
        
        .icard-comp-body { padding: 30px; display: none; background: #fff; }

        .icon-arrow { font-size: 14px; transition: transform 0.3s; }
        .active > .icon-arrow { transform: rotate(180deg); }

        .comp-context {
            background: rgba(10, 30, 63, 0.03); padding: 20px; border-radius: 8px;
            margin-bottom: 25px; border: 1px solid rgba(10, 30, 63, 0.08);
        }
        .comp-context p { margin: 0 0 10px 0; font-size: 15px; line-height: 1.5; color: #444;}
        .comp-context p:last-child { margin: 0; }
        .criterio-central { display: inline-block; background: var(--ysa-yellow); color: var(--ysa-blue); padding: 8px 15px; border-radius: 4px; font-weight: bold; font-size: 14px; margin-top: 10px; }

        /* =========================================
           TARJETAS DE CASOS (BOTONES INTERACTIVOS)
           ========================================= */
        .criterio-block {
            margin-bottom: 35px; border-top: 1px dashed #eee; padding-top: 25px;
        }
        .criterio-block:first-child { border-top: none; padding-top: 0; }
        
        .criterio-title { color: var(--ysa-blue); font-size: 17px; margin: 0 0 8px 0; text-transform: uppercase; }
        .criterio-hipotesis { font-style: italic; color: #555; margin: 0 0 20px 0; font-size: 15px; border-left: 3px solid var(--ysa-yellow); padding-left: 15px; }

        .clasificacion-tabs {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;
        }

        .c-card-btn {
            background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 18px 15px;
            text-align: center; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            font-size: 14px; font-weight: 800; text-transform: uppercase;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        
        .c-card-btn::before { font-size: 20px; }
        .c-card-btn[data-type="valido"]::before { content: "✅"; }
        .c-card-btn[data-type="debil"]::before { content: "⚠️"; }
        .c-card-btn[data-type="noValido"]::before { content: "❌"; }
        .c-card-btn[data-type="noEvaluable"]::before { content: "⚪"; }

        .c-card-btn[data-type="valido"] { border-top: 5px solid var(--valid-border); color: var(--valid-text); }
        .c-card-btn[data-type="debil"] { border-top: 5px solid var(--weak-border); color: var(--weak-text); }
        .c-card-btn[data-type="noValido"] { border-top: 5px solid var(--invalid-border); color: var(--invalid-text); }
        .c-card-btn[data-type="noEvaluable"] { border-top: 5px solid var(--noteval-border); color: var(--noteval-text); }

        .c-card-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.08); }
        
        .c-card-btn[data-type="valido"].active { background: var(--valid-bg); box-shadow: inset 0 0 0 1px var(--valid-border); }
        .c-card-btn[data-type="debil"].active { background: var(--weak-bg); box-shadow: inset 0 0 0 1px var(--weak-border); }
        .c-card-btn[data-type="noValido"].active { background: var(--invalid-bg); box-shadow: inset 0 0 0 1px var(--invalid-border); }
        .c-card-btn[data-type="noEvaluable"].active { background: var(--noteval-bg); box-shadow: inset 0 0 0 1px var(--noteval-border); }

        .case-display-area {
            border-radius: 8px; padding: 25px; display: block; background: white;
            animation: fadeIn 0.3s; border: 1px solid #eee;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        
        .show-valido { background: var(--valid-bg); border-left: 5px solid var(--valid-border); }
        .show-debil { background: var(--weak-bg); border-left: 5px solid var(--weak-border); }
        .show-noValido { background: var(--invalid-bg); border-left: 5px solid var(--invalid-border); }
        .show-noEvaluable { background: var(--noteval-bg); border-left: 5px solid var(--noteval-border); }

        .case-header { font-size: 18px; font-weight: 800; margin-top: 0; margin-bottom: 15px; text-transform: uppercase;}
        .case-context { font-size: 15px; line-height: 1.5; margin-bottom: 15px; }
        
        .label { font-weight: 800; color: #444; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;}
        .card-phrase { font-style: italic; background: rgba(255,255,255,0.7); padding: 15px; border-radius: 4px; border-left: 3px solid rgba(0,0,0,0.2); margin: 5px 0; color: #222; font-size: 15px;}
        .card-facts { margin: 5px 0 15px 0; padding-left: 20px; font-size: 15px; line-height: 1.5;}
        .card-facts li { margin-bottom: 6px; }
        .card-why { font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
        
        .box-regla, .box-error { padding: 15px; border-radius: 6px; font-size: 14px; margin-top: 15px; line-height: 1.5;}
        .box-regla { background-color: rgba(10, 30, 63, 0.05); border-left: 4px solid var(--ysa-blue); }
        .box-error { background-color: rgba(244, 67, 54, 0.08); border-left: 4px solid var(--invalid-border); }

        .empty-state { text-align: center; padding: 30px; color: var(--text-muted); background: #f9f9f9; border-radius: 8px; border: 1px dashed #ccc; font-size: 15px;}

        @media (max-width: 1000px) { .clasificacion-tabs { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            .clasificacion-tabs { grid-template-columns: 1fr; }
            .profile-context { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 15px; text-align: center; }
            .header-title { border-left: none; padding-left: 0; }
            .tab-btn { padding: 15px; font-size: 14px; }
        }
        :fullscreen .container { max-width: 100%; margin-top: 30px; padding: 0 50px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="EDI - Plataforma-01.png" alt="Logo EDI">
            <div class="header-title">
                <span class="header-title-main">ESCENARIOS DE ESTUDIO - MÓDULO 1</span>
                <span class="header-title-sub">Afinamiento del Modelo de Negocio | YSA Colombia Incubation Eje Cafetero</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-fullscreen" onclick="toggleFullScreen()">📺 Pantalla Completa</button>
            <img src="Copy of Logo - YOUTH STARTUP ACADEMY Colombia (1).png" alt="Logo YSA" class="logo-ysa">
        </div>
    </header>

    <div class="container">
        <!-- NAVEGACIÓN NIVEL 1: Pestañas de Perfiles -->
        <div class="tabs" id="tabs-perfiles"></div>

        <!-- CONTENIDO PRINCIPAL DEL PERFIL -->
        <div class="content-area" id="dynamic-workspace">
            <div class="empty-state">⚙️ Cargando Arquitectura Metodológica...</div>
        </div>
    </div>

    <script>
        /* ========================================================
           1. LIBRERÍA DE CASOS POR PERFIL Y COMPONENTE (LIMPIA Y SIN DUPLICADOS)
           ======================================================== */
        
        // --- DATOS PERFIL A ---

        };

        /* ========================================================
           2. MOTOR DE RENDERIZADO Y LÓGICA DE UI
           ======================================================== */
        let perfilActivoId = "perfil-c"; 
        
        // Objeto global para almacenar los casos
        const globalCasesMap = {};

        function initApp() {
            const tabsContainer = document.getElementById('tabs-perfiles');
            
            atlasMetodologico.perfiles.forEach((perfil) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${perfilActivoId === perfil.id ? 'active' : ''}`;
                btn.textContent = perfil.nombre;
                btn.onclick = (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    perfilActivoId = perfil.id;
                    renderWorkspace();
                };
                tabsContainer.appendChild(btn);
            });

            renderWorkspace();
        }

        function renderWorkspace() {
            const perfil = atlasMetodologico.perfiles.find(p => p.id === perfilActivoId);
            const workspace = document.getElementById('dynamic-workspace');
            
            // 1. Contexto del Perfil
            let html = `
                <div class="profile-context">
                    <h2>${perfil.nombre} — ${perfil.subtitulo}</h2>
                    <div class="profile-col">
                        <h4>⚠️ Error estructural típico</h4>
                        <p>${perfil.errorTipico}</p>
                        
                        <h4>🔍 Qué debe mirar el facilitador</h4>
                        <ul>${perfil.queDebeMirar.map(item => `<li>${item}</li>`).join('')}</ul>
                    </div>
                    <div class="profile-col">
                        <h4>🧩 Qué suele confundir este perfil</h4>
                        <ul>${perfil.queSueleConfundir.map(item => `<li>${item}</li>`).join('')}</ul>
                    </div>
                </div>
            `;

            if (!perfil.modulos || perfil.modulos.length === 0) {
                html += `<div class="empty-state">Módulos en construcción para este perfil.</div>`;
                workspace.innerHTML = html;
                return;
            }

            // 2. Acordeones de Componentes Directamente (Omitiendo la capa de Módulos)
            perfil.modulos.forEach((mod) => {
                if (!mod.sesiones || mod.sesiones.length === 0) return;

                mod.sesiones.forEach(ses => {
                    if (!ses.componentes || ses.componentes.length === 0) return;

                    ses.componentes.forEach((comp, compIndex) => {
                        const compIsOpen = compIndex === 0 ? 'active' : '';
                        const compBodyStyle = compIndex === 0 ? 'style="display:block;"' : '';

                        html += `
                            <div class="icard-comp">
                                <div class="icard-comp-header ${compIsOpen}" onclick="toggleCard(this)">
                                    ${comp.nombre} <span class="icon-arrow">▼</span>
                                </div>
                                <div class="icard-comp-body" ${compBodyStyle}>
                        `;

                        if (comp.criterios && comp.criterios.length > 0) {
                            // Renderizamos propósito y criterio central del componente
                            html += `
                                <div class="comp-context">
                                    <p><strong>Propósito:</strong> ${comp.proposito || 'No especificado'}</p>
                                    <span class="criterio-central">🎯 Criterio Central: ${comp.criterioCentral || 'No especificado'}</span>
                                </div>
                            `;

                            // 5. Múltiples Criterios dentro del Componente
                            comp.criterios.forEach((crit) => {
                                const uniqueCritId = `${mod.id}-${ses.id}-${comp.id}-${crit.id}`;
                                globalCasesMap[uniqueCritId] = crit.casos;

                                // Renderizado de las 4 tarjetas (botones)
                                html += `
                                    <div class="criterio-block">
                                        <h4 class="criterio-title">${crit.nombre}</h4>
                                        <p class="criterio-hipotesis">💡 Hipótesis: "${crit.hipotesis}"</p>
                                        
                                        <div class="clasificacion-tabs">
                                            <div class="c-card-btn" data-type="valido" onclick="showCase('${uniqueCritId}', 'valido', this)">Válido</div>
                                            <div class="c-card-btn" data-type="debil" onclick="showCase('${uniqueCritId}', 'debil', this)">Débil</div>
                                            <div class="c-card-btn" data-type="noValido" onclick="showCase('${uniqueCritId}', 'noValido', this)">No Válido</div>
                                            <div class="c-card-btn" data-type="noEvaluable" onclick="showCase('${uniqueCritId}', 'noEvaluable', this)">No Evaluable</div>
                                        </div>
                                        
                                        <div id="display-${uniqueCritId}" class="case-display-area">
                                            <div class="empty-state" style="padding: 20px;">
                                                ☝️ Selecciona una de las tarjetas superiores para revelar el análisis del caso.
                                            </div>
                                        </div>
                                    </div>
                                `;
                            });
                        } else {
                            html += `<div class="empty-state" style="padding: 20px;">Criterios y casos en construcción.</div>`;
                        }

                        html += `</div></div>`; // Cierra icard-comp-body e icard-comp
                    });
                });
            });

            workspace.innerHTML = html;
        }

        function showCase(critId, caseType, btnElement) {
            const displayArea = document.getElementById(`display-${critId}`);

            if (btnElement.classList.contains('active')) {
                btnElement.classList.remove('active');
                displayArea.innerHTML = `
                    <div class="empty-state" style="padding: 20px;">
                        ☝️ Selecciona una de las tarjetas superiores para revelar el análisis del caso.
                    </div>
                `;
                displayArea.className = 'case-display-area';
                return;
            }

            const buttons = btnElement.parentElement.querySelectorAll('.c-card-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            const data = globalCasesMap[critId] ? globalCasesMap[critId][caseType] : null;

            if(!data || !data.titulo) {
                displayArea.innerHTML = `
                    <div class="empty-state" style="padding: 20px;">
                        ⚙️ El caso para esta clasificación aún no ha sido cargado en el sistema.
                    </div>`;
                displayArea.className = `case-display-area show-${caseType}`;
                return;
            }
            
            displayArea.innerHTML = `
                <div class="case-header" style="color: var(--${caseType === 'valido' ? 'valid' : caseType === 'debil' ? 'weak' : caseType === 'noValido' ? 'invalid' : 'noteval'}-text);">
                    ${data.clasificacion}: ${data.titulo}
                </div>
                
                <span class="label">Contexto:</span>
                <div class="case-context">${data.contexto}</div>
                
                <span class="label">Frase del emprendedor:</span>
                <div class="card-phrase">"${data.frase_emprendedor}"</div>
                
                <span class="label">Hechos Observables:</span>
                <ul class="card-facts">
                    ${data.hechos_observables.map(h => `<li>${h}</li>`).join('')}
                </ul>
                
                <span class="label" style="margin-top:20px;">Por qué recibe esta clasificación:</span>
                <div class="card-why">${data.por_que}</div>
                
                <div class="box-regla"><strong>⚖️ Regla metodológica:</strong><br>${data.regla_metodologica}</div>
                <div class="box-error"><strong>⚠️ Error frecuente:</strong><br>${data.error_frecuente}</div>
            `;

            displayArea.className = `case-display-area show-${caseType}`;
        }

        // --- Funciones UI Complementarias ---
        function toggleCard(headerElement) {
            const isComp = headerElement.classList.contains('icard-comp-header');
            const isMod = headerElement.classList.contains('icard-mod-header');
            const wasActive = headerElement.classList.contains('active');

            // Cerramos todas las tarjetas del mismo nivel que estén abiertas
            if (isComp) {
                const parent = headerElement.closest('.icard-mod-body') || document.body;
                const siblings = parent.querySelectorAll('.icard-comp-header');
                siblings.forEach(h => {
                    h.classList.remove('active');
                    h.nextElementSibling.style.display = 'none';
                });
            } else if (isMod) {
                const siblings = document.querySelectorAll('.icard-mod-header');
                siblings.forEach(h => {
                    h.classList.remove('active');
                    h.nextElementSibling.style.display = 'none';
                });
            }

            // Si la tarjeta no estaba activa originalmente, la abrimos
            if (!wasActive) {
                headerElement.classList.add("active");
                headerElement.nextElementSibling.style.display = "block";
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }
        
        document.addEventListener('fullscreenchange', () => {
            const fbtn = document.querySelector('.btn-fullscreen');
            if(fbtn) fbtn.innerHTML = document.fullscreenElement ? '❌ Salir de Pantalla' : '📺 Pantalla Completa';
        });

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
